<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" width="860" height="220">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#07091A"/>
    </linearGradient>
    <linearGradient id="cardG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110828"/>
      <stop offset="100%" style="stop-color:#0A0D1C"/>
    </linearGradient>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#84CC16"/>
    </linearGradient>
    <linearGradient id="limeG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16"/>
      <stop offset="100%" style="stop-color:#4D7C0F"/>
    </linearGradient>
    <linearGradient id="violetG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arrowV" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#84CC16"/>
    </marker>
    <style>
      @keyframes dash1 {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes dash2 {
        0% { stroke-dashoffset: 80; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes dash3 {
        0% { stroke-dashoffset: 90; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes pulseDot {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.3); }
      }
      @keyframes scanH {
        0% { transform: translateX(-10px); opacity: 0; }
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translateX(870px); opacity: 0; }
      }
      @keyframes countUp {
        0% { opacity: 0.3; }
        50% { opacity: 1; }
        100% { opacity: 0.3; }
      }
      .pipe1 { animation: dash1 2s linear infinite; stroke-dasharray: 8 4; }
      .pipe2 { animation: dash2 2.4s linear infinite 0.4s; stroke-dasharray: 8 4; }
      .pipe3 { animation: dash3 1.8s linear infinite 0.8s; stroke-dasharray: 8 4; }
      .pdot { animation: pulseDot 1.8s ease-in-out infinite; transform-origin: center; }
      .scan-h { animation: scanH 5s linear infinite; }
      .counter { animation: countUp 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="10" fill="url(#bgG)"/>

  <!-- Horizontal scan -->
  <rect class="scan-h" x="-10" y="0" width="10" height="220" fill="url(#accentG)" opacity="0.06"/>

  <!-- Center glow behind main card -->
  <ellipse cx="430" cy="110" rx="200" ry="80" fill="url(#centerGlow)"/>

  <!-- ====== STEP 1: ANSWER SHEET INPUT ====== -->
  <rect x="30" y="45" width="160" height="130" rx="8" fill="url(#cardG)" stroke="#2D1B6B" stroke-width="1.5"/>
  <!-- 3D depth effect -->
  <rect x="36" y="51" width="160" height="130" rx="8" fill="none" stroke="#1A0D3E" stroke-width="1" opacity="0.5"/>

  <!-- Paper stack visual -->
  <rect x="50" y="75" width="80" height="70" rx="3" fill="#0F0524" stroke="#7C3AED" stroke-width="1" opacity="0.7"/>
  <rect x="55" y="70" width="80" height="70" rx="3" fill="#110828" stroke="#7C3AED" stroke-width="1" opacity="0.5"/>
  <rect x="60" y="65" width="80" height="70" rx="3" fill="#140C2E" stroke="#A78BFA" stroke-width="1"/>
  <!-- Lines on paper -->
  <g stroke="#2D1B6B" stroke-width="1" opacity="0.8">
    <line x1="68" y1="80" x2="128" y2="80"/>
    <line x1="68" y1="88" x2="128" y2="88"/>
    <line x1="68" y1="96" x2="128" y2="96"/>
    <line x1="68" y1="104" x2="120" y2="104"/>
    <line x1="68" y1="112" x2="128" y2="112"/>
    <line x1="68" y1="120" x2="118" y2="120"/>
  </g>
  <!-- Handwriting effect -->
  <g stroke="#7C3AED" stroke-width="1.2" fill="none" opacity="0.7">
    <path d="M68,82 Q75,80 82,82 Q89,84 96,82"/>
    <path d="M68,90 Q78,88 88,90 Q95,92 105,90"/>
    <path d="M68,98 Q72,96 80,98"/>
  </g>

  <text x="110" y="62" fill="#7C3AED" font-size="8" font-family="monospace">SCAN</text>
  <text x="110" y="73" fill="#4B5563" font-size="7" font-family="monospace">IN</text>

  <text x="110" y="58" fill="#84CC16" font-size="9" font-family="monospace" opacity="0.6">●</text>

  <text x="110" y="140" fill="#84CC16" font-size="9" font-family="monospace">OCR</text>
  <text x="110" y="152" fill="#A78BFA" font-size="8" font-family="monospace">+PDF</text>

  <text x="110" y="168" fill="#4B5563" font-size="7" font-family="monospace">PARSE</text>

  <text x="110" y="180" fill="#84CC16" font-size="14" font-family="monospace" filter="url(#glow3)">↓</text>

  <!-- Label -->
  <text x="110" y="196" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">ANSWER</text>
  <text x="110" y="207" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">SHEET</text>

  <!-- ====== ARROW 1 ====== -->
  <line class="pipe1" x1="196" y1="110" x2="270" y2="110" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrowV)"/>
  <text x="230" y="105" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">INGEST</text>

  <!-- ====== STEP 2: OCR ENGINE ====== -->
  <rect x="274" y="45" width="150" height="130" rx="8" fill="url(#cardG)" stroke="#2D1B6B" stroke-width="1.5"/>
  <rect x="280" y="51" width="150" height="130" rx="8" fill="none" stroke="#1A0D3E" stroke-width="1" opacity="0.5"/>

  <!-- OCR visual -->
  <rect x="290" y="62" width="118" height="85" rx="4" fill="#0A0518" stroke="#4D7C0F" stroke-width="1"/>
  <!-- Scanning beam animation -->
  <rect x="290" y="62" width="118" height="3" fill="url(#limeG)" opacity="0.5">
    <animate attributeName="y" from="62" to="143" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <!-- Recognition boxes -->
  <g stroke="#84CC16" stroke-width="0.8" fill="none" opacity="0.6">
    <rect x="296" y="70" width="30" height="14" rx="2"/>
    <rect x="332" y="70" width="40" height="14" rx="2"/>
    <rect x="378" y="70" width="24" height="14" rx="2"/>
    <rect x="296" y="90" width="50" height="12" rx="2"/>
    <rect x="352" y="90" width="32" height="12" rx="2"/>
    <rect x="296" y="108" width="38" height="12" rx="2"/>
    <rect x="340" y="108" width="28" height="12" rx="2"/>
    <rect x="374" y="108" width="28" height="12" rx="2"/>
    <rect x="296" y="126" width="44" height="12" rx="2"/>
    <rect x="346" y="126" width="20" height="12" rx="2"/>
  </g>

  <!-- Confidence score -->
  <text x="349" y="170" fill="#84CC16" font-size="11" font-family="monospace" text-anchor="middle" filter="url(#glow3)">94.3%</text>
  <text x="349" y="182" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">PARSE ACCURACY</text>

  <text x="349" y="196" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">OCR + PARSE</text>
  <text x="349" y="207" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">ENGINE</text>

  <!-- ====== ARROW 2 ====== -->
  <line class="pipe2" x1="430" y1="110" x2="500" y2="110" stroke="#84CC16" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="463" y="105" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">EVAL</text>

  <!-- ====== STEP 3: LLM JUDGE ====== -->
  <rect x="502" y="30" width="170" height="160" rx="8" fill="url(#cardG)" stroke="#4D7C0F" stroke-width="2" filter="url(#glow3)"/>
  <rect x="508" y="36" width="170" height="160" rx="8" fill="none" stroke="#84CC16" stroke-width="0.5" opacity="0.4"/>

  <!-- Brain/neural visual -->
  <!-- Outer ring -->
  <circle cx="587" cy="105" r="42" fill="none" stroke="#2D1B6B" stroke-width="1.5" stroke-dasharray="4 3">
    <animateTransform attributeName="transform" type="rotate" from="0 587 105" to="360 587 105" dur="20s" repeatCount="indefinite"/>
  </circle>
  <!-- Inner circle -->
  <circle cx="587" cy="105" r="28" fill="#0D1806" stroke="#4D7C0F" stroke-width="1.5"/>
  <circle cx="587" cy="105" r="22" fill="#111F07" stroke="#84CC16" stroke-width="1"/>
  <!-- Gemini/LLM logo-ish shape -->
  <text cx="587" cy="105" x="576" y="112" fill="#BEF264" font-size="20" font-family="monospace" filter="url(#glow2)">⚙</text>

  <!-- Orbital nodes -->
  <circle cx="587" cy="63" r="5" fill="#0A1206" stroke="#84CC16" stroke-width="1.5"/>
  <circle class="pdot" cx="587" cy="63" r="3" fill="url(#limeNode)">
    <animate attributeName="cx" values="587;629;587;545;587" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="63;105;147;105;63" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Labels on card -->
  <text x="587" y="22" fill="#84CC16" font-size="10" font-family="monospace" text-anchor="middle" font-weight="bold">GRADONIX</text>
  <text x="587" y="185" fill="#BEF264" font-size="8" font-family="monospace" text-anchor="middle">LLM JUDGE MATRIX</text>

  <rect x="510" y="191" width="155" height="14" rx="3" fill="#0A1206" stroke="#4D7C0F" stroke-width="1"/>
  <rect x="510" y="191" width="108" height="14" rx="3" fill="#1A3A06" stroke="none"/>
  <text x="587" y="201" fill="#84CC16" font-size="8" font-family="monospace" text-anchor="middle">PROGRESS ████████░░ 94%</text>

  <!-- ====== ARROW 3 ====== -->
  <line class="pipe3" x1="678" y1="110" x2="748" y2="110" stroke="#7C3AED" stroke-width="2" marker-end="url(#arrowV)"/>
  <text x="713" y="105" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">SCORE</text>

  <!-- ====== STEP 4: METRICS REPORT ====== -->
  <rect x="750" y="45" width="84" height="130" rx="8" fill="url(#cardG)" stroke="#2D1B6B" stroke-width="1.5"/>
  <rect x="756" y="51" width="84" height="130" rx="8" fill="none" stroke="#1A0D3E" stroke-width="1" opacity="0.5"/>

  <!-- Score display -->
  <text x="792" y="85" fill="#A78BFA" font-size="8" font-family="monospace" text-anchor="middle">GRADE</text>
  <text x="792" y="105" fill="#E2D9FF" font-size="26" font-family="monospace" text-anchor="middle" font-weight="bold" filter="url(#glow3)">A+</text>

  <!-- Mini bar chart -->
  <g>
    <rect x="762" y="130" width="8" height="25" rx="2" fill="#7C3AED" opacity="0.7"/>
    <rect x="774" y="120" width="8" height="35" rx="2" fill="#A78BFA" opacity="0.7"/>
    <rect x="786" y="125" width="8" height="30" rx="2" fill="#7C3AED" opacity="0.7"/>
    <rect x="798" y="115" width="8" height="40" rx="2" fill="#A78BFA" opacity="0.8"/>
    <rect x="810" y="122" width="8" height="33" rx="2" fill="#84CC16" opacity="0.9" filter="url(#glow3)"/>
  </g>

  <text x="792" y="172" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">REPORT</text>
  <text x="792" y="183" fill="#A78BFA" font-size="8" font-family="monospace" text-anchor="middle">-60% TIME</text>

  <!-- Bottom label -->
  <text x="430" y="17" fill="#4B5563" font-size="9" font-family="monospace" text-anchor="middle" letter-spacing="3">AI-POWERED EXAM EVALUATION PIPELINE</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="859" height="219" rx="10" fill="none" stroke="#1E1E35" stroke-width="1"/>
</svg>
