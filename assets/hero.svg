<svg viewBox="0 0 900 290" xmlns="http://www.w3.org/2000/svg" width="900" height="290">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#080D1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060912;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowViolet" cx="75%" cy="45%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.22" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glowLime" cx="18%" cy="65%" r="30%">
      <stop offset="0%" style="stop-color:#84CC16;stop-opacity:0.10" />
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.6" />
    </radialGradient>
    <radialGradient id="limeNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#BEF264;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#65A30D;stop-opacity:0.7" />
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E2D9FF" />
      <stop offset="45%" style="stop-color:#FFFFFF" />
      <stop offset="100%" style="stop-color:#BEF264" />
    </linearGradient>
    <linearGradient id="stackBarV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="stackBarL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0.2" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="lineGlow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <clipPath id="cardClip">
      <rect x="0" y="0" width="900" height="290" rx="12" ry="12" />
    </clipPath>
    <style>
      @keyframes pulse1 { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      @keyframes pulse2 { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.85; } }
      @keyframes flowLine1 { 0% { stroke-dashoffset: 200; opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 0; } }
      @keyframes flowLine2 { 0% { stroke-dashoffset: 160; opacity: 0; } 25% { opacity: 0.8; } 75% { opacity: 0.8; } 100% { stroke-dashoffset: 0; opacity: 0; } }
      @keyframes scanLine { 0% { transform: translateY(0px); opacity: 0; } 10% { opacity: 0.35; } 90% { opacity: 0.35; } 100% { transform: translateY(290px); opacity: 0; } }
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes particleFloat { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.7; } }
      @keyframes pillPop { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
      .np-a { animation: pulse1 2.4s ease-in-out infinite; }
      .np-b { animation: pulse2 3.1s ease-in-out infinite 0.5s; }
      .np-c { animation: pulse1 2.8s ease-in-out infinite 1s; }
      .np-d { animation: pulse2 2.2s ease-in-out infinite 0.8s; }
      .np-e { animation: pulse1 3.4s ease-in-out infinite 1.4s; }
      .fl-a { animation: flowLine1 3s ease-in-out infinite; stroke-dasharray: 200; }
      .fl-b { animation: flowLine2 2.6s ease-in-out infinite 0.7s; stroke-dasharray: 160; }
      .fl-c { animation: flowLine1 3.5s ease-in-out infinite 1.2s; stroke-dasharray: 180; }
      .scan { animation: scanLine 7s linear infinite; }
      .cur { animation: blink 1s step-end infinite; }
      .fi-1 { animation: fadeInUp 0.8s ease forwards 0.2s; opacity: 0; }
      .fi-2 { animation: fadeInUp 0.8s ease forwards 0.5s; opacity: 0; }
      .fi-3 { animation: fadeInUp 0.8s ease forwards 0.8s; opacity: 0; }
      .fi-4 { animation: fadeInUp 0.8s ease forwards 1.1s; opacity: 0; }
      .pa { animation: particleFloat 2.8s ease-in-out infinite; }
      .pb { animation: particleFloat 3.5s ease-in-out infinite 0.6s; }
      .pc { animation: particleFloat 2.2s ease-in-out infinite 1.1s; }
      .pp { animation: pillPop 3s ease-in-out infinite; }
    </style>
  </defs>

  <g clip-path="url(#cardClip)">
    <rect width="900" height="290" fill="url(#bgGrad)" />
    <rect width="900" height="290" fill="url(#glowViolet)" />
    <rect width="900" height="290" fill="url(#glowLime)" />

    <!-- Grid -->
    <g opacity="0.055">
      <line x1="60" y1="0" x2="60" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="180" y1="0" x2="180" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="240" y1="0" x2="240" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="300" y1="0" x2="300" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="360" y1="0" x2="360" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="420" y1="0" x2="420" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="480" y1="0" x2="480" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="540" y1="0" x2="540" y2="320" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="40" x2="900" y2="40" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="900" y2="80" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="900" y2="120" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="900" y2="160" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="900" y2="200" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="240" x2="900" y2="240" stroke="#7C3AED" stroke-width="0.5"/>
      
    </g>

    <rect class="scan" x="0" y="-4" width="900" height="2" fill="url(#nodeGlow)" opacity="0.12"/>

    <!-- ===== NEURAL NET (right column, compressed) ===== -->
    <g opacity="0.16" stroke="#7C3AED" stroke-width="0.8">
      <line x1="660" y1="65" x2="715" y2="95"/><line x1="660" y1="65" x2="715" y2="135"/><line x1="660" y1="65" x2="715" y2="175"/>
      <line x1="660" y1="130" x2="715" y2="95"/><line x1="660" y1="130" x2="715" y2="135"/><line x1="660" y1="130" x2="715" y2="175"/>
      <line x1="660" y1="195" x2="715" y2="95"/><line x1="660" y1="195" x2="715" y2="135"/><line x1="660" y1="195" x2="715" y2="175"/>
    </g>
    <g opacity="0.16" stroke="#84CC16" stroke-width="0.8">
      <line x1="715" y1="95" x2="770" y2="85"/><line x1="715" y1="95" x2="770" y2="130"/><line x1="715" y1="95" x2="770" y2="175"/>
      <line x1="715" y1="135" x2="770" y2="85"/><line x1="715" y1="135" x2="770" y2="130"/><line x1="715" y1="135" x2="770" y2="175"/>
      <line x1="715" y1="175" x2="770" y2="85"/><line x1="715" y1="175" x2="770" y2="130"/><line x1="715" y1="175" x2="770" y2="175"/>
    </g>
    <g opacity="0.22" stroke="#A78BFA" stroke-width="1">
      <line x1="770" y1="85" x2="840" y2="130"/><line x1="770" y1="130" x2="840" y2="130"/><line x1="770" y1="175" x2="840" y2="130"/>
    </g>
    <line class="fl-a" x1="660" y1="130" x2="715" y2="130" stroke="#A78BFA" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>
    <line class="fl-b" x1="715" y1="95" x2="770" y2="130" stroke="#BEF264" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>
    <line class="fl-c" x1="770" y1="130" x2="840" y2="130" stroke="#A78BFA" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>

    <circle cx="660" cy="65" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="np-a" cx="660" cy="65" r="3.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="660" cy="130" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="np-b" cx="660" cy="130" r="3.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="660" cy="195" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="np-c" cx="660" cy="195" r="3.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="715" cy="95" r="5" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="np-d" cx="715" cy="95" r="3.5" fill="url(#limeNode)" filter="url(#softGlow)"/>
    <circle cx="715" cy="135" r="5" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="np-e" cx="715" cy="135" r="3.5" fill="url(#limeNode)" filter="url(#softGlow)"/>
    <circle cx="715" cy="175" r="5" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="np-a" cx="715" cy="175" r="3.5" fill="url(#limeNode)" filter="url(#softGlow)"/>
    <circle cx="770" cy="85" r="4.5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="np-b" cx="770" cy="85" r="2.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="770" cy="130" r="4.5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="np-c" cx="770" cy="130" r="2.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="770" cy="175" r="4.5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="np-d" cx="770" cy="175" r="2.5" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="840" cy="130" r="13" fill="#0D0818" stroke="#7C3AED" stroke-width="1.8" opacity="0.9"/>
    <circle cx="840" cy="130" r="9" fill="#1E0A4E" stroke="#A78BFA" stroke-width="1"/>
    <circle class="np-a" cx="840" cy="130" r="5" fill="url(#nodeGlow)" filter="url(#strongGlow)"/>
    <text x="660" y="218" fill="#4B5563" font-size="6.5" font-family="monospace" text-anchor="middle">INPUT</text>
    <text x="715" y="218" fill="#4B5563" font-size="6.5" font-family="monospace" text-anchor="middle">HIDDEN</text>
    <text x="770" y="218" fill="#4B5563" font-size="6.5" font-family="monospace" text-anchor="middle">HIDDEN</text>
    <text x="840" y="230" fill="#7C3AED" font-size="6.5" font-family="monospace" text-anchor="middle">OUT</text>

    <!-- ===== LEFT CONTENT ===== -->
    <!-- Status bar -->
    <rect x="30" y="22" width="205" height="18" rx="4" fill="#0F0F1A" stroke="#1E1E35" stroke-width="1"/>
    <circle cx="42" cy="31" r="3.5" fill="#84CC16" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="50" y="35" fill="#84CC16" font-size="8" font-family="monospace" letter-spacing="0.5">SYS_STATUS: ACTIVE</text>
    <text x="255" y="35" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="end">LOC: BANGALORE, IN</text>

    <!-- Shell prompt top -->
    <text x="30" y="20" fill="#4B5563" font-size="8" font-family="monospace" class="fi-1">anushka@dev:~$</text>
    <text x="102" y="20" fill="#A78BFA" font-size="8" font-family="monospace" class="fi-1">ssh core@anushka.build</text>

    <!-- Name -->
    <text class="fi-2" x="30" y="92" font-size="44" font-weight="700" font-family="'Arial Black', sans-serif" letter-spacing="-1" fill="url(#nameGrad)">ANUSHKA JAIN</text>

    <!-- Subtitle -->
    <rect x="30" y="102" width="3" height="22" rx="1" fill="#84CC16" class="fi-2"/>
    <text class="fi-3" x="40" y="118" font-size="12.5" font-family="monospace" fill="#C4B5FD" letter-spacing="2">FULL STACK SDE · AI/ML ENGINEER</text>

    <line x1="30" y1="132" x2="620" y2="132" stroke="#1E1E35" stroke-width="1"/>

    <!-- Tags row -->
    <g class="fi-3">
      <rect x="30" y="143" width="115" height="19" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
      <text x="87" y="156" fill="#C4B5FD" font-size="8.5" font-family="monospace" text-anchor="middle">FULL_STACK_SDE</text>

      <rect x="153" y="143" width="100" height="19" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
      <text x="203" y="156" fill="#BEF264" font-size="8.5" font-family="monospace" text-anchor="middle">RAG_PIPELINES</text>

      <rect x="261" y="143" width="98" height="19" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
      <text x="310" y="156" fill="#C4B5FD" font-size="8.5" font-family="monospace" text-anchor="middle">LLM_SYSTEMS</text>

      <rect x="367" y="143" width="88" height="19" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
      <text x="411" y="156" fill="#BEF264" font-size="8.5" font-family="monospace" text-anchor="middle">AI_PRODUCTS</text>
    </g>

    <!-- ===== KEY TECH PILLS (compact, non-repetitive) ===== -->
    <g class="fi-4">
      <!-- Python -->
      <rect x="30" y="182" width="52" height="16" rx="8" fill="#0F0F1A" stroke="#3776AB" stroke-width="0.8" class="pp"/>
      <text x="56" y="193" fill="#60A5FA" font-size="7.5" font-family="monospace" text-anchor="middle">Python</text>
      <!-- MERN -->
      <rect x="88" y="182" width="46" height="16" rx="8" fill="#0F0F1A" stroke="#61DAFB" stroke-width="0.8"/>
      <text x="111" y="193" fill="#67E8F9" font-size="7.5" font-family="monospace" text-anchor="middle">MERN</text>
      <!-- FastAPI -->
      <rect x="140" y="182" width="50" height="16" rx="8" fill="#0F0F1A" stroke="#009688" stroke-width="0.8"/>
      <text x="165" y="193" fill="#6EE7B7" font-size="7.5" font-family="monospace" text-anchor="middle">FastAPI</text>
      <!-- PostgreSQL -->
      <rect x="196" y="182" width="74" height="16" rx="8" fill="#0F0F1A" stroke="#4169E1" stroke-width="0.8"/>
      <text x="233" y="193" fill="#93C5FD" font-size="7.5" font-family="monospace" text-anchor="middle">PostgreSQL</text>
      <!-- pgvector -->
      <rect x="276" y="182" width="60" height="16" rx="8" fill="#0F0F1A" stroke="#7C3AED" stroke-width="0.8" class="pp"/>
      <text x="306" y="193" fill="#C4B5FD" font-size="7.5" font-family="monospace" text-anchor="middle">pgvector</text>
      <!-- PyTorch -->
      <rect x="342" y="182" width="54" height="16" rx="8" fill="#0F0F1A" stroke="#EE4C2C" stroke-width="0.8"/>
      <text x="369" y="193" fill="#FCA5A5" font-size="7.5" font-family="monospace" text-anchor="middle">PyTorch</text>
      <!-- LLM APIs -->
      <rect x="402" y="182" width="60" height="16" rx="8" fill="#0F0F1A" stroke="#84CC16" stroke-width="0.8" class="pp"/>
      <text x="432" y="193" fill="#BEF264" font-size="7.5" font-family="monospace" text-anchor="middle">LLM APIs</text>
      <!-- DSA -->
      <rect x="468" y="182" width="40" height="16" rx="8" fill="#0F0F1A" stroke="#FFA116" stroke-width="0.8"/>
      <text x="488" y="193" fill="#FDE68A" font-size="7.5" font-family="monospace" text-anchor="middle">DSA</text>
      <!-- Docker -->
      <rect x="514" y="182" width="46" height="16" rx="8" fill="#0F0F1A" stroke="#2496ED" stroke-width="0.8"/>
      <text x="537" y="193" fill="#93C5FD" font-size="7.5" font-family="monospace" text-anchor="middle">Docker</text>
    </g>

    <line x1="30" y1="208" x2="630" y2="208" stroke="#1A1A2E" stroke-width="0.8"/>

    <!-- Terminal -->
    <rect x="30" y="218" width="580" height="34" rx="5" fill="#05070D" stroke="#1A1A2E" stroke-width="1"/>
    <text x="44" y="239" fill="#7C3AED" font-size="9" font-family="monospace">anushka@dev</text>
    <text x="120" y="239" fill="#4B5563" font-size="9" font-family="monospace">:</text>
    <text x="126" y="239" fill="#84CC16" font-size="9" font-family="monospace">~/projects</text>
    <text x="182" y="239" fill="#E2D9FF" font-size="9" font-family="monospace">$ git push origin main --force &amp;&amp; deploy</text>
    <rect class="cur" x="417" y="228" width="6" height="11" fill="#84CC16" opacity="0.8"/>

    <!-- Info strip bottom -->
    <text x="30" y="270" fill="#4B5563" font-size="7.5" font-family="monospace">BITS PILANI · CS · CGPA 9.22</text>
    <circle cx="192" cy="266" r="1.8" fill="#2D1B6B"/>
    <text x="200" y="270" fill="#4B5563" font-size="7.5" font-family="monospace">Full Stack + AI/ML</text>
    <circle cx="293" cy="266" r="1.8" fill="#2D1B6B"/>
    <text x="301" y="270" fill="#4B5563" font-size="7.5" font-family="monospace">RAG · LLM Eval · Vector DBs</text>
    <circle cx="453" cy="266" r="1.8" fill="#2D1B6B"/>
    <text x="461" y="270" fill="#4B5563" font-size="7.5" font-family="monospace">DSA · System Design</text>

    <!-- Particles -->
    <circle class="pa" cx="600" cy="50" r="2" fill="#7C3AED" opacity="0.45"/>
    <circle class="pb" cx="618" cy="90" r="1.5" fill="#84CC16" opacity="0.35"/>
    <circle class="pc" cx="608" cy="210" r="2" fill="#7C3AED" opacity="0.3"/>
    <circle class="pa" cx="622" cy="260" r="1" fill="#84CC16" opacity="0.45"/>

    <rect x="0" y="0" width="900" height="290" rx="12" fill="none" stroke="#1E1E35" stroke-width="1.5"/>
    <rect x="1" y="1" width="898" height="288" rx="11" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
