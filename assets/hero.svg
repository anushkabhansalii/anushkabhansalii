<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#080D1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#060912;stop-opacity:1" />
    </linearGradient>

    <!-- Violet glow gradient -->
    <radialGradient id="glowViolet" cx="75%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>

    <!-- Lime accent gradient -->
    <radialGradient id="glowLime" cx="20%" cy="60%" r="30%">
      <stop offset="0%" style="stop-color:#84CC16;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0" />
    </radialGradient>

    <!-- Node highlight gradient -->
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.6" />
    </radialGradient>

    <!-- Lime node -->
    <radialGradient id="limeNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#BEF264;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#65A30D;stop-opacity:0.7" />
    </radialGradient>

    <!-- Text shimmer -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E2D9FF" />
      <stop offset="45%" style="stop-color:#FFFFFF" />
      <stop offset="100%" style="stop-color:#BEF264" />
    </linearGradient>

    <!-- Filter: soft glow -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Filter: strong glow -->
    <filter id="strongGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Filter: line glow -->
    <filter id="lineGlow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Clip path for card -->
    <clipPath id="cardClip">
      <rect x="0" y="0" width="900" height="280" rx="12" ry="12" />
    </clipPath>

    <!-- Pulse animation -->
    <style>
      @keyframes pulse1 {
        0%, 100% { opacity: 0.6; r: 4; }
        50% { opacity: 1; r: 6; }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.4; r: 3; }
        50% { opacity: 0.9; r: 5; }
      }
      @keyframes flowLine1 {
        0% { stroke-dashoffset: 200; opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes flowLine2 {
        0% { stroke-dashoffset: 160; opacity: 0; }
        25% { opacity: 0.8; }
        75% { opacity: 0.8; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      @keyframes scanLine {
        0% { transform: translateY(0px); opacity: 0; }
        10% { opacity: 0.4; }
        90% { opacity: 0.4; }
        100% { transform: translateY(280px); opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(8px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes orbFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }
      @keyframes ringRotate {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes ringRotateRev {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(-360deg); }
      }
      @keyframes particleFloat {
        0%, 100% { opacity: 0.3; transform: translateY(0); }
        50% { opacity: 0.8; transform: translateY(-4px); }
      }
      .node-pulse-a { animation: pulse1 2.4s ease-in-out infinite; }
      .node-pulse-b { animation: pulse2 3.1s ease-in-out infinite 0.5s; }
      .node-pulse-c { animation: pulse1 2.8s ease-in-out infinite 1s; }
      .node-pulse-d { animation: pulse2 2.2s ease-in-out infinite 0.8s; }
      .node-pulse-e { animation: pulse1 3.4s ease-in-out infinite 1.4s; }
      .flow-a { animation: flowLine1 3s ease-in-out infinite; stroke-dasharray: 200; }
      .flow-b { animation: flowLine2 2.6s ease-in-out infinite 0.7s; stroke-dasharray: 160; }
      .flow-c { animation: flowLine1 3.5s ease-in-out infinite 1.2s; stroke-dasharray: 180; }
      .scan { animation: scanLine 6s linear infinite; }
      .cursor-blink { animation: blink 1s step-end infinite; }
      .fade-in-1 { animation: fadeInUp 0.8s ease forwards 0.2s; opacity: 0; }
      .fade-in-2 { animation: fadeInUp 0.8s ease forwards 0.5s; opacity: 0; }
      .fade-in-3 { animation: fadeInUp 0.8s ease forwards 0.8s; opacity: 0; }
      .orb-float { animation: orbFloat 4s ease-in-out infinite; }
      .ring-rotate { animation: ringRotate 12s linear infinite; transform-origin: 786px 140px; }
      .ring-rotate-rev { animation: ringRotateRev 18s linear infinite; transform-origin: 786px 140px; }
      .particle-a { animation: particleFloat 2.8s ease-in-out infinite; }
      .particle-b { animation: particleFloat 3.5s ease-in-out infinite 0.6s; }
      .particle-c { animation: particleFloat 2.2s ease-in-out infinite 1.1s; }
    </style>
  </defs>

  <g clip-path="url(#cardClip)">
    <!-- Base background -->
    <rect width="900" height="280" fill="url(#bgGrad)" />

    <!-- Ambient glows -->
    <rect width="900" height="280" fill="url(#glowViolet)" />
    <rect width="900" height="280" fill="url(#glowLime)" />

    <!-- Grid pattern - subtle -->
    <g opacity="0.06">
      <!-- Vertical lines -->
      <line x1="60" y1="0" x2="60" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="120" y1="0" x2="120" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="180" y1="0" x2="180" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="240" y1="0" x2="240" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="300" y1="0" x2="300" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="360" y1="0" x2="360" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="420" y1="0" x2="420" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="480" y1="0" x2="480" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="540" y1="0" x2="540" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="600" y1="0" x2="600" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="660" y1="0" x2="660" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="720" y1="0" x2="720" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="780" y1="0" x2="780" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="840" y1="0" x2="840" y2="280" stroke="#7C3AED" stroke-width="0.5"/>
      <!-- Horizontal lines -->
      <line x1="0" y1="40" x2="900" y2="40" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="80" x2="900" y2="80" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="120" x2="900" y2="120" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="900" y2="160" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="200" x2="900" y2="200" stroke="#7C3AED" stroke-width="0.5"/>
      <line x1="0" y1="240" x2="900" y2="240" stroke="#7C3AED" stroke-width="0.5"/>
    </g>

    <!-- Scan line effect -->
    <rect class="scan" x="0" y="-4" width="900" height="2" fill="url(#nodeGlow)" opacity="0.15"/>

    <!-- ====== NEURAL NETWORK DIAGRAM (right side) ====== -->
    <!-- Layer connection lines - static base -->
    <!-- Layer 0 → Layer 1 -->
    <g opacity="0.18" stroke="#7C3AED" stroke-width="0.8">
      <line x1="640" y1="70" x2="700" y2="100"/>
      <line x1="640" y1="70" x2="700" y2="140"/>
      <line x1="640" y1="70" x2="700" y2="180"/>
      <line x1="640" y1="140" x2="700" y2="100"/>
      <line x1="640" y1="140" x2="700" y2="140"/>
      <line x1="640" y1="140" x2="700" y2="180"/>
      <line x1="640" y1="210" x2="700" y2="100"/>
      <line x1="640" y1="210" x2="700" y2="140"/>
      <line x1="640" y1="210" x2="700" y2="180"/>
    </g>
    <!-- Layer 1 → Layer 2 -->
    <g opacity="0.18" stroke="#84CC16" stroke-width="0.8">
      <line x1="700" y1="100" x2="760" y2="90"/>
      <line x1="700" y1="100" x2="760" y2="140"/>
      <line x1="700" y1="100" x2="760" y2="190"/>
      <line x1="700" y1="140" x2="760" y2="90"/>
      <line x1="700" y1="140" x2="760" y2="140"/>
      <line x1="700" y1="140" x2="760" y2="190"/>
      <line x1="700" y1="180" x2="760" y2="90"/>
      <line x1="700" y1="180" x2="760" y2="140"/>
      <line x1="700" y1="180" x2="760" y2="190"/>
    </g>
    <!-- Layer 2 → Output -->
    <g opacity="0.25" stroke="#A78BFA" stroke-width="1">
      <line x1="760" y1="90" x2="830" y2="140"/>
      <line x1="760" y1="140" x2="830" y2="140"/>
      <line x1="760" y1="190" x2="830" y2="140"/>
    </g>

    <!-- Animated flow lines on top -->
    <line class="flow-a" x1="640" y1="140" x2="700" y2="140" stroke="#A78BFA" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>
    <line class="flow-b" x1="700" y1="100" x2="760" y2="140" stroke="#BEF264" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>
    <line class="flow-c" x1="760" y1="140" x2="830" y2="140" stroke="#A78BFA" stroke-width="2" opacity="0" filter="url(#lineGlow)"/>

    <!-- INPUT LAYER nodes -->
    <circle cx="640" cy="70" r="6" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="node-pulse-a" cx="640" cy="70" r="4" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="640" cy="140" r="6" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="node-pulse-b" cx="640" cy="140" r="4" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="640" cy="210" r="6" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.5"/>
    <circle class="node-pulse-c" cx="640" cy="210" r="4" fill="url(#nodeGlow)" filter="url(#softGlow)"/>

    <!-- HIDDEN LAYER nodes -->
    <circle cx="700" cy="100" r="6" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="node-pulse-d" cx="700" cy="100" r="4" fill="url(#limeNode)" filter="url(#softGlow)"/>
    <circle cx="700" cy="140" r="6" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="node-pulse-e" cx="700" cy="140" r="4" fill="url(#limeNode)" filter="url(#softGlow)"/>
    <circle cx="700" cy="180" r="6" fill="#0D1A06" stroke="#84CC16" stroke-width="1.5"/>
    <circle class="node-pulse-a" cx="700" cy="180" r="4" fill="url(#limeNode)" filter="url(#softGlow)"/>

    <!-- HIDDEN LAYER 2 nodes -->
    <circle cx="760" cy="90" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="node-pulse-b" cx="760" cy="90" r="3" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="760" cy="140" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="node-pulse-c" cx="760" cy="140" r="3" fill="url(#nodeGlow)" filter="url(#softGlow)"/>
    <circle cx="760" cy="190" r="5" fill="#1A0A3A" stroke="#7C3AED" stroke-width="1.2"/>
    <circle class="node-pulse-d" cx="760" cy="190" r="3" fill="url(#nodeGlow)" filter="url(#softGlow)"/>

    <!-- OUTPUT NODE - large pulsing -->
    <circle cx="830" cy="140" r="14" fill="#0D0818" stroke="#7C3AED" stroke-width="2" opacity="0.9"/>
    <circle cx="830" cy="140" r="10" fill="#1E0A4E" stroke="#A78BFA" stroke-width="1"/>
    <circle class="node-pulse-a" cx="830" cy="140" r="6" fill="url(#nodeGlow)" filter="url(#strongGlow)"/>

    <!-- Layer labels -->
    <text x="640" y="245" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">INPUT</text>
    <text x="700" y="245" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">HIDDEN</text>
    <text x="760" y="245" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">HIDDEN</text>
    <text x="830" y="260" fill="#7C3AED" font-size="7" font-family="monospace" text-anchor="middle">OUTPUT</text>

    <!-- ====== LEFT CONTENT AREA ====== -->
    <!-- Status bar top -->
    <rect x="30" y="22" width="180" height="18" rx="4" fill="#0F0F1A" stroke="#1E1E35" stroke-width="1"/>
    <circle cx="42" cy="31" r="4" fill="#84CC16" filter="url(#softGlow)">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="51" y="35" fill="#84CC16" font-size="8" font-family="monospace" letter-spacing="0.5">SYS_STATUS: ACTIVE</text>
    <text x="230" y="35" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="end">LOC: PILANI, IN</text>

    <!-- Type badge -->
    <text x="30" y="20" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="start" class="fade-in-1">anushka@lab:~$</text>
    <text x="107" y="20" fill="#A78BFA" font-size="8" font-family="monospace">ssh build@anushka.ai</text>

    <!-- Main name -->
    <text class="fade-in-2" x="30" y="95" font-size="44" font-weight="700" font-family="'Arial Black', sans-serif" letter-spacing="-1" fill="url(#nameGrad)">ANUSHKA JAIN</text>

    <!-- Subtitle line -->
    <rect x="30" y="105" width="3" height="22" rx="1" fill="#84CC16" class="fade-in-2"/>
    <text class="fade-in-3" x="40" y="121" font-size="13" font-family="monospace" fill="#C4B5FD" letter-spacing="2">AI/ML ENGINEER · BUILDER · CO-FOUNDER</text>

    <!-- Divider -->
    <line x1="30" y1="136" x2="570" y2="136" stroke="#1E1E35" stroke-width="1"/>

    <!-- Tags row -->
    <g class="fade-in-3">
      <!-- Tag 1 -->
      <rect x="30" y="148" width="105" height="20" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
      <text x="82" y="162" fill="#C4B5FD" font-size="9" font-family="monospace" text-anchor="middle">RAG_PIPELINES</text>

      <!-- Tag 2 -->
      <rect x="144" y="148" width="100" height="20" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
      <text x="194" y="162" fill="#BEF264" font-size="9" font-family="monospace" text-anchor="middle">LLM_EVAL</text>

      <!-- Tag 3 -->
      <rect x="253" y="148" width="105" height="20" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
      <text x="305" y="162" fill="#C4B5FD" font-size="9" font-family="monospace" text-anchor="middle">FULL_STACK</text>

      <!-- Tag 4 -->
      <rect x="367" y="148" width="100" height="20" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
      <text x="417" y="162" fill="#BEF264" font-size="9" font-family="monospace" text-anchor="middle">CO_FOUNDER</text>
    </g>

    <!-- Stats row -->
    <g class="fade-in-3">
      <text x="30" y="200" fill="#4B5563" font-size="8" font-family="monospace">BITS PILANI · CS · CGPA 9.22</text>
      <circle cx="200" cy="196" r="2" fill="#4B5563"/>
      <text x="210" y="200" fill="#4B5563" font-size="8" font-family="monospace">94.3% EVAL ACCURACY</text>
      <circle cx="330" cy="196" r="2" fill="#4B5563"/>
      <text x="340" y="200" fill="#4B5563" font-size="8" font-family="monospace">200+ EDUCATOR USERS</text>
    </g>

    <!-- Terminal line at bottom -->
    <rect x="30" y="220" width="520" height="36" rx="5" fill="#05070D" stroke="#1A1A2E" stroke-width="1"/>
    <text x="44" y="243" fill="#7C3AED" font-size="9" font-family="monospace">anushka@gradonix</text>
    <text x="148" y="243" fill="#4B5563" font-size="9" font-family="monospace">:</text>
    <text x="154" y="243" fill="#84CC16" font-size="9" font-family="monospace">~/build</text>
    <text x="198" y="243" fill="#E2D9FF" font-size="9" font-family="monospace">$ git log --oneline --all</text>
    <text x="400" y="243" fill="#7C3AED" font-size="9" font-family="monospace">■</text>
    <rect class="cursor-blink" x="408" y="232" width="6" height="11" fill="#84CC16" opacity="0.8"/>

    <!-- Floating particles -->
    <circle class="particle-a" cx="580" cy="50" r="2" fill="#7C3AED" opacity="0.5"/>
    <circle class="particle-b" cx="600" cy="80" r="1.5" fill="#84CC16" opacity="0.4"/>
    <circle class="particle-c" cx="610" cy="200" r="2" fill="#7C3AED" opacity="0.3"/>
    <circle class="particle-a" cx="590" cy="230" r="1" fill="#84CC16" opacity="0.5"/>

    <!-- Border frame -->
    <rect x="0" y="0" width="900" height="280" rx="12" fill="none" stroke="#1E1E35" stroke-width="1.5"/>
    <rect x="1" y="1" width="898" height="278" rx="11" fill="none" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  </g>
</svg>
