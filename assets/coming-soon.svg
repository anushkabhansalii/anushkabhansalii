<svg viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg" width="860" height="180">
  <defs>
    <linearGradient id="bgCS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#07091A"/>
    </linearGradient>
    <linearGradient id="fadeL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </linearGradient>
    <style>
      @keyframes glitch1 {
        0%, 90%, 100% { transform: translate(0, 0); clip-path: none; opacity: 1; }
        92% { transform: translate(-2px, 0); clip-path: inset(30% 0 40% 0); opacity: 0.8; }
        94% { transform: translate(2px, 0); clip-path: inset(60% 0 10% 0); opacity: 0.9; }
        96% { transform: translate(0, 0); opacity: 1; }
      }
      @keyframes glitch2 {
        0%, 85%, 100% { transform: translate(0, 0); opacity: 0; }
        87% { transform: translate(3px, 0); opacity: 0.6; }
        89% { transform: translate(-2px, 0); opacity: 0.4; }
        91% { opacity: 0; }
      }
      @keyframes scanCS {
        0% { opacity: 0; transform: translateX(0); }
        50% { opacity: 1; }
        100% { opacity: 0; transform: translateX(860px); }
      }
      @keyframes blink2 { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes float3 {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      .glitch-main { animation: glitch1 5s infinite; }
      .glitch-copy { animation: glitch2 5s infinite; fill: #84CC16; }
      .scanCS { animation: scanCS 8s linear infinite; }
      .blk2 { animation: blink2 1.2s step-end infinite; }
      .fl3 { animation: float3 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="860" height="180" rx="10" fill="url(#bgCS)"/>

  <!-- Grid dots pattern -->
  <g opacity="0.08">
    <g fill="#7C3AED">
      <!-- Row 1 -->
      <circle cx="40" cy="30" r="1"/><circle cx="80" cy="30" r="1"/><circle cx="120" cy="30" r="1"/>
      <circle cx="160" cy="30" r="1"/><circle cx="200" cy="30" r="1"/><circle cx="240" cy="30" r="1"/>
      <circle cx="280" cy="30" r="1"/><circle cx="320" cy="30" r="1"/><circle cx="360" cy="30" r="1"/>
      <circle cx="400" cy="30" r="1"/><circle cx="440" cy="30" r="1"/><circle cx="480" cy="30" r="1"/>
      <circle cx="520" cy="30" r="1"/><circle cx="560" cy="30" r="1"/><circle cx="600" cy="30" r="1"/>
      <circle cx="640" cy="30" r="1"/><circle cx="680" cy="30" r="1"/><circle cx="720" cy="30" r="1"/>
      <circle cx="760" cy="30" r="1"/><circle cx="800" cy="30" r="1"/><circle cx="840" cy="30" r="1"/>
      <!-- Row 2 -->
      <circle cx="40" cy="70" r="1"/><circle cx="80" cy="70" r="1"/><circle cx="120" cy="70" r="1"/>
      <circle cx="160" cy="70" r="1"/><circle cx="200" cy="70" r="1"/><circle cx="240" cy="70" r="1"/>
      <circle cx="280" cy="70" r="1"/><circle cx="320" cy="70" r="1"/><circle cx="360" cy="70" r="1"/>
      <circle cx="400" cy="70" r="1"/><circle cx="440" cy="70" r="1"/><circle cx="480" cy="70" r="1"/>
      <circle cx="520" cy="70" r="1"/><circle cx="560" cy="70" r="1"/><circle cx="600" cy="70" r="1"/>
      <circle cx="640" cy="70" r="1"/><circle cx="680" cy="70" r="1"/><circle cx="720" cy="70" r="1"/>
      <circle cx="760" cy="70" r="1"/><circle cx="800" cy="70" r="1"/><circle cx="840" cy="70" r="1"/>
      <!-- Row 3 -->
      <circle cx="40" cy="110" r="1"/><circle cx="80" cy="110" r="1"/><circle cx="120" cy="110" r="1"/>
      <circle cx="160" cy="110" r="1"/><circle cx="200" cy="110" r="1"/><circle cx="240" cy="110" r="1"/>
      <circle cx="280" cy="110" r="1"/><circle cx="320" cy="110" r="1"/><circle cx="360" cy="110" r="1"/>
      <circle cx="400" cy="110" r="1"/><circle cx="440" cy="110" r="1"/><circle cx="480" cy="110" r="1"/>
      <circle cx="520" cy="110" r="1"/><circle cx="560" cy="110" r="1"/><circle cx="600" cy="110" r="1"/>
      <circle cx="640" cy="110" r="1"/><circle cx="680" cy="110" r="1"/><circle cx="720" cy="110" r="1"/>
      <circle cx="760" cy="110" r="1"/><circle cx="800" cy="110" r="1"/><circle cx="840" cy="110" r="1"/>
      <!-- Row 4 -->
      <circle cx="40" cy="150" r="1"/><circle cx="80" cy="150" r="1"/><circle cx="120" cy="150" r="1"/>
      <circle cx="160" cy="150" r="1"/><circle cx="200" cy="150" r="1"/><circle cx="240" cy="150" r="1"/>
      <circle cx="280" cy="150" r="1"/><circle cx="320" cy="150" r="1"/><circle cx="360" cy="150" r="1"/>
      <circle cx="400" cy="150" r="1"/><circle cx="440" cy="150" r="1"/><circle cx="480" cy="150" r="1"/>
      <circle cx="520" cy="150" r="1"/><circle cx="560" cy="150" r="1"/><circle cx="600" cy="150" r="1"/>
      <circle cx="640" cy="150" r="1"/><circle cx="680" cy="150" r="1"/><circle cx="720" cy="150" r="1"/>
      <circle cx="760" cy="150" r="1"/><circle cx="800" cy="150" r="1"/><circle cx="840" cy="150" r="1"/>
    </g>
  </g>

  <!-- Horizontal scan beam -->
  <rect class="scanCS" x="-20" y="0" width="20" height="180" fill="url(#fadeL)" opacity="0.4"/>

  <!-- Left bracket -->
  <rect x="80" y="60" width="3" height="60" rx="1" fill="#7C3AED" opacity="0.6"/>
  <rect x="83" y="60" width="12" height="3" rx="1" fill="#7C3AED" opacity="0.6"/>
  <rect x="83" y="117" width="12" height="3" rx="1" fill="#7C3AED" opacity="0.6"/>

  <!-- Right bracket -->
  <rect x="777" y="60" width="3" height="60" rx="1" fill="#7C3AED" opacity="0.6"/>
  <rect x="765" y="60" width="12" height="3" rx="1" fill="#7C3AED" opacity="0.6"/>
  <rect x="765" y="117" width="12" height="3" rx="1" fill="#7C3AED" opacity="0.6"/>

  <!-- Main text -->
  <g class="fl3">
    <text x="430" y="68" font-size="11" font-family="monospace" fill="#4B5563" text-anchor="middle" letter-spacing="4">INITIALIZING NEW MODULE</text>
    <text class="glitch-main" x="430" y="110" font-size="40" font-family="'Arial Black', monospace" fill="#E2D9FF" text-anchor="middle" letter-spacing="2" font-weight="bold">COMING SOON</text>
    <text class="glitch-copy" x="432" y="110" font-size="40" font-family="'Arial Black', monospace" fill="#84CC16" text-anchor="middle" letter-spacing="2" font-weight="bold" opacity="0">COMING SOON</text>
  </g>

  <!-- Terminal prompt below -->
  <text x="342" y="142" fill="#4B5563" font-size="11" font-family="monospace" text-anchor="middle">build@anushka</text>
  <text x="400" y="142" fill="#4B5563" font-size="11" font-family="monospace">:</text>
  <text x="406" y="142" fill="#84CC16" font-size="11" font-family="monospace">~/next_project</text>
  <text x="524" y="142" fill="#E2D9FF" font-size="11" font-family="monospace">$ _</text>
  <rect class="blk2" x="540" y="130" width="8" height="13" fill="#84CC16"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="859" height="179" rx="10" fill="none" stroke="#1E1E35" stroke-width="1"/>
  <rect x="2" y="2" width="856" height="176" rx="9" fill="none" stroke="#7C3AED" stroke-width="0.4" opacity="0.3"/>
</svg>
