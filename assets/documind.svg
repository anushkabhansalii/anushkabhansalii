<svg viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg" width="860" height="230">
  <defs>
    <linearGradient id="bgDM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#07091A"/>
    </linearGradient>
    <linearGradient id="cardDM" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110828"/>
      <stop offset="100%" style="stop-color:#0A0D1C"/>
    </linearGradient>
    <linearGradient id="limeGD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#84CC16"/>
      <stop offset="100%" style="stop-color:#4D7C0F"/>
    </linearGradient>
    <linearGradient id="violetGD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <radialGradient id="centerGlowDM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
    <filter id="glDM" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glDM2" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arDMv" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arDMl" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#84CC16"/>
    </marker>
    <style>
      @keyframes dmDash1 { 0%{stroke-dashoffset:80}100%{stroke-dashoffset:0} }
      @keyframes dmDash2 { 0%{stroke-dashoffset:70}100%{stroke-dashoffset:0} }
      @keyframes dmDash3 { 0%{stroke-dashoffset:75}100%{stroke-dashoffset:0} }
      @keyframes dmDash4 { 0%{stroke-dashoffset:65}100%{stroke-dashoffset:0} }
      @keyframes dmPulse { 0%,100%{opacity:0.5;r:3}50%{opacity:1;r:5} }
      @keyframes dmWave { 0%,100%{transform:scaleY(0.6)}50%{transform:scaleY(1)} }
      @keyframes dmScan { 0%{transform:translateX(-10px);opacity:0}10%{opacity:0.5}90%{opacity:0.5}100%{transform:translateX(870px);opacity:0} }
      @keyframes dmFloat { 0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)} }
      @keyframes dmBlink { 0%,100%{opacity:1}50%{opacity:0.2} }
      .dm1{animation:dmDash1 1.8s linear infinite;stroke-dasharray:8 4;}
      .dm2{animation:dmDash2 2.2s linear infinite 0.4s;stroke-dasharray:8 4;}
      .dm3{animation:dmDash3 1.6s linear infinite 0.8s;stroke-dasharray:8 4;}
      .dm4{animation:dmDash4 2s linear infinite 1.1s;stroke-dasharray:8 4;}
      .dmp{animation:dmPulse 2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
      .dmw1{animation:dmWave 1.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
      .dmw2{animation:dmWave 1.2s ease-in-out infinite 0.15s;transform-box:fill-box;transform-origin:center;}
      .dmw3{animation:dmWave 1.2s ease-in-out infinite 0.3s;transform-box:fill-box;transform-origin:center;}
      .dmw4{animation:dmWave 1.2s ease-in-out infinite 0.45s;transform-box:fill-box;transform-origin:center;}
      .dmw5{animation:dmWave 1.2s ease-in-out infinite 0.6s;transform-box:fill-box;transform-origin:center;}
      .dmscan{animation:dmScan 7s linear infinite;}
      .dmfl{animation:dmFloat 3.5s ease-in-out infinite;}
      .dmbl{animation:dmBlink 1.8s ease-in-out infinite;}
    </style>
  </defs>

  <rect width="860" height="230" rx="10" fill="url(#bgDM)"/>
  <ellipse cx="430" cy="115" rx="220" ry="90" fill="url(#centerGlowDM)"/>

  <!-- scan beam -->
  <rect class="dmscan" x="-15" y="0" width="15" height="230" fill="#7C3AED" opacity="0.06"/>

  <!-- top label -->
  <text x="430" y="16" fill="#4B5563" font-size="8.5" font-family="monospace" text-anchor="middle" letter-spacing="3">DOCUMIND · OPEN-SOURCE NOTEBOOKLM · RAG + MEMORY + VOICE</text>

  <!-- ===== STEP 1: INGEST ===== -->
  <rect x="18" y="28" width="128" height="172" rx="7" fill="url(#cardDM)" stroke="#2D1B6B" stroke-width="1.5"/>

  <!-- Doc types stack visual -->
  <text x="82" y="46" fill="#7C3AED" font-size="8" font-family="monospace" text-anchor="middle">INGEST</text>

  <!-- PDF icon -->
  <rect x="32" y="52" width="45" height="32" rx="3" fill="#0D0520" stroke="#7C3AED" stroke-width="1"/>
  <text x="54" y="65" fill="#A78BFA" font-size="7" font-family="monospace" text-anchor="middle">PDF</text>
  <text x="54" y="76" fill="#4B5563" font-size="6" font-family="monospace" text-anchor="middle">PyMuPDF</text>

  <!-- Audio icon -->
  <rect x="85" y="52" width="45" height="32" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
  <text x="107" y="65" fill="#BEF264" font-size="7" font-family="monospace" text-anchor="middle">AUDIO</text>
  <text x="107" y="76" fill="#4B5563" font-size="6" font-family="monospace" text-anchor="middle">AssemblyAI</text>

  <!-- YouTube icon -->
  <rect x="32" y="90" width="45" height="32" rx="3" fill="#0D0520" stroke="#7C3AED" stroke-width="1"/>
  <text x="54" y="103" fill="#A78BFA" font-size="7" font-family="monospace" text-anchor="middle">YT</text>
  <text x="54" y="114" fill="#4B5563" font-size="6" font-family="monospace" text-anchor="middle">yt-dlp</text>

  <!-- Web icon -->
  <rect x="85" y="90" width="45" height="32" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
  <text x="107" y="103" fill="#BEF264" font-size="7" font-family="monospace" text-anchor="middle">WEB</text>
  <text x="107" y="114" fill="#4B5563" font-size="6" font-family="monospace" text-anchor="middle">Firecrawl</text>

  <!-- TXT/MD -->
  <rect x="32" y="128" width="98" height="22" rx="3" fill="#0D0520" stroke="#2D1B6B" stroke-width="1"/>
  <text x="81" y="142" fill="#6B7280" font-size="7" font-family="monospace" text-anchor="middle">TXT · MD · more</text>

  <text x="82" y="185" fill="#E2D9FF" font-size="8.5" font-family="monospace" text-anchor="middle" font-weight="bold">MULTI-FORMAT</text>
  <text x="82" y="196" fill="#E2D9FF" font-size="8.5" font-family="monospace" text-anchor="middle" font-weight="bold">INGEST</text>

  <!-- ARROW 1 -->
  <line class="dm1" x1="150" y1="114" x2="196" y2="114" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arDMv)"/>
  <text x="173" y="109" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">CHUNK</text>

  <!-- ===== STEP 2: EMBED + VECTOR DB ===== -->
  <rect x="199" y="28" width="148" height="172" rx="7" fill="url(#cardDM)" stroke="#2D1B6B" stroke-width="1.5"/>

  <text x="273" y="46" fill="#84CC16" font-size="8" font-family="monospace" text-anchor="middle">EMBED + STORE</text>

  <!-- Vector space mini visualisation -->
  <rect x="210" y="52" width="126" height="90" rx="4" fill="#06031A" stroke="#1A0D3E" stroke-width="1"/>
  <line x1="220" y1="132" x2="220" y2="60" stroke="#1A1A2E" stroke-width="1"/>
  <line x1="220" y1="132" x2="326" y2="132" stroke="#1A1A2E" stroke-width="1"/>

  <!-- Embedding clusters -->
  <circle class="dmp" cx="285" cy="72" r="4" fill="#84CC16" opacity="0.9"/>
  <circle cx="298" cy="80" r="3.5" fill="#84CC16" opacity="0.65"/>
  <circle cx="275" cy="82" r="3" fill="#84CC16" opacity="0.55"/>
  <circle cx="292" cy="90" r="3" fill="#84CC16" opacity="0.7"/>

  <circle cx="244" cy="96" r="3.5" fill="#7C3AED" opacity="0.8"/>
  <circle cx="255" cy="106" r="3" fill="#7C3AED" opacity="0.6"/>
  <circle cx="240" cy="112" r="2.5" fill="#7C3AED" opacity="0.7"/>

  <circle cx="306" cy="118" r="2.5" fill="#4B5563" opacity="0.5"/>
  <circle cx="228" cy="70" r="2" fill="#4B5563" opacity="0.4"/>

  <!-- Query vector animated line -->
  <line x1="220" y1="114" x2="280" y2="85" stroke="#BEF264" stroke-width="1" stroke-dasharray="3 3" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.5s" repeatCount="indefinite"/>
  </line>

  <!-- Milvus label -->
  <rect x="210" y="150" width="126" height="16" rx="3" fill="#0A1206" stroke="#4D7C0F" stroke-width="1"/>
  <text x="273" y="161" fill="#84CC16" font-size="8" font-family="monospace" text-anchor="middle">Milvus Vector DB</text>

  <!-- BAAI label -->
  <rect x="210" y="170" width="126" height="14" rx="3" fill="#0D0818" stroke="#2D1B6B" stroke-width="1"/>
  <text x="273" y="180" fill="#A78BFA" font-size="7.5" font-family="monospace" text-anchor="middle">BAAI Embeddings</text>

  <text x="273" y="200" fill="#E2D9FF" font-size="8.5" font-family="monospace" text-anchor="middle" font-weight="bold">SEMANTIC</text>
  <text x="273" y="211" fill="#E2D9FF" font-size="8.5" font-family="monospace" text-anchor="middle" font-weight="bold">RETRIEVAL</text>

  <!-- ARROW 2 -->
  <line class="dm2" x1="351" y1="114" x2="395" y2="114" stroke="#84CC16" stroke-width="1.8" marker-end="url(#arDMl)"/>
  <text x="373" y="109" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">QUERY</text>

  <!-- ===== STEP 3: RAG + MEMORY (CENTRE CARD) ===== -->
  <rect x="398" y="16" width="162" height="196" rx="7" fill="url(#cardDM)" stroke="#4D7C0F" stroke-width="2" filter="url(#glDM2)"/>
  <rect x="404" y="22" width="162" height="196" rx="7" fill="none" stroke="#84CC16" stroke-width="0.5" opacity="0.3"/>

  <text x="479" y="36" fill="#84CC16" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">DOCUMIND</text>
  <text x="479" y="47" fill="#4D7C0F" font-size="7" font-family="monospace" text-anchor="middle">RAG CORE + MEMORY</text>

  <!-- RAG brain visual -->
  <circle cx="479" cy="100" r="38" fill="none" stroke="#1A1A2E" stroke-width="1.5" stroke-dasharray="3 3">
    <animateTransform attributeName="transform" type="rotate" from="0 479 100" to="360 479 100" dur="25s" repeatCount="indefinite"/>
  </circle>
  <circle cx="479" cy="100" r="26" fill="#0D1806" stroke="#3D6B0A" stroke-width="1.5"/>
  <circle cx="479" cy="100" r="18" fill="#111F07" stroke="#84CC16" stroke-width="1"/>

  <!-- LLM symbol -->
  <text x="467" y="107" fill="#BEF264" font-size="18" font-family="monospace" filter="url(#glDM)">AI</text>

  <!-- Orbit dot -->
  <circle r="4" fill="#0A1206" stroke="#84CC16" stroke-width="1.5">
    <animateMotion dur="6s" repeatCount="indefinite">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </circle>
  <circle r="2.5" fill="#BEF264" filter="url(#glDM2)">
    <animateMotion dur="6s" repeatCount="indefinite">
      <mpath href="#orbitPath"/>
    </animateMotion>
  </circle>
  <path id="orbitPath" d="M479,62 A38,38 0 1,1 478,62" fill="none"/>

  <!-- Zep memory block -->
  <rect x="410" y="148" width="138" height="18" rx="4" fill="#0A1206" stroke="#4D7C0F" stroke-width="1"/>
  <text x="479" y="160" fill="#BEF264" font-size="8" font-family="monospace" text-anchor="middle">Zep Memory Graphs</text>

  <!-- Groq model -->
  <rect x="410" y="170" width="138" height="16" rx="4" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
  <text x="479" y="181" fill="#C4B5FD" font-size="8" font-family="monospace" text-anchor="middle">Groq Llama 3.3 70B</text>

  <!-- Citation tag -->
  <rect x="410" y="190" width="138" height="14" rx="4" fill="#050B03" stroke="#2D6B0A" stroke-width="1"/>
  <text x="479" y="200" fill="#4D7C0F" font-size="7.5" font-family="monospace" text-anchor="middle">Citation-First Responses</text>

  <!-- ARROW 3 -->
  <line class="dm3" x1="564" y1="114" x2="608" y2="114" stroke="#7C3AED" stroke-width="1.8" marker-end="url(#arDMv)"/>
  <text x="586" y="109" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">OUTPUT</text>

  <!-- ===== STEP 4: OUTPUT (CHAT + PODCAST) ===== -->
  <rect x="611" y="28" width="232" height="172" rx="7" fill="url(#cardDM)" stroke="#2D1B6B" stroke-width="1.5"/>

  <!-- LEFT SIDE: Chat output -->
  <rect x="620" y="40" width="102" height="130" rx="5" fill="#06031A" stroke="#1A0D3E" stroke-width="1"/>
  <text x="671" y="54" fill="#7C3AED" font-size="7.5" font-family="monospace" text-anchor="middle">CHAT UI</text>

  <!-- Chat bubbles -->
  <rect x="626" y="60" width="88" height="20" rx="3" fill="#1A0D3E"/>
  <text x="670" y="71" fill="#C4B5FD" font-size="6.5" font-family="monospace" text-anchor="middle">What does doc say?</text>

  <rect x="626" y="84" width="88" height="28" rx="3" fill="#0A1206" stroke="#3D6B0A" stroke-width="0.8"/>
  <text x="670" y="95" fill="#BEF264" font-size="6" font-family="monospace" text-anchor="middle">According to p.3:</text>
  <text x="670" y="104" fill="#84CC16" font-size="6" font-family="monospace" text-anchor="middle">"cited excerpt" [3]</text>

  <rect x="626" y="116" width="88" height="20" rx="3" fill="#1A0D3E"/>
  <text x="670" y="129" fill="#C4B5FD" font-size="6.5" font-family="monospace" text-anchor="middle">Tell me more...</text>

  <rect x="626" y="140" width="88" height="18" rx="3" fill="#050B03" stroke="#1A0D3E" stroke-width="0.8"/>
  <text x="670" y="151" fill="#4B5563" font-size="6.5" font-family="monospace" text-anchor="middle">type a message...</text>
  <rect class="dmbl" x="712" y="143" width="4" height="9" fill="#84CC16" opacity="0.7"/>

  <!-- RIGHT SIDE: Podcast / Voice -->
  <rect x="728" y="40" width="107" height="130" rx="5" fill="#06031A" stroke="#1A0D3E" stroke-width="1"/>
  <text x="781" y="54" fill="#84CC16" font-size="7.5" font-family="monospace" text-anchor="middle">AI PODCAST</text>

  <!-- Waveform bars animated -->
  <g transform="translate(740,80)">
    <rect class="dmw1" x="0" y="0" width="8" height="24" rx="3" fill="#7C3AED" opacity="0.85"/>
    <rect class="dmw2" x="12" y="4" width="8" height="32" rx="3" fill="#A78BFA" opacity="0.85"/>
    <rect class="dmw3" x="24" y="0" width="8" height="40" rx="3" fill="#84CC16" opacity="0.9"/>
    <rect class="dmw4" x="36" y="4" width="8" height="28" rx="3" fill="#A78BFA" opacity="0.85"/>
    <rect class="dmw5" x="48" y="2" width="8" height="36" rx="3" fill="#7C3AED" opacity="0.85"/>
    <rect class="dmw1" x="60" y="8" width="8" height="20" rx="3" fill="#84CC16" opacity="0.8"/>
    <rect class="dmw2" x="72" y="2" width="8" height="34" rx="3" fill="#A78BFA" opacity="0.85"/>
  </g>

  <!-- Speaker labels -->
  <rect x="736" y="130" width="44" height="14" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="0.8"/>
  <text x="758" y="140" fill="#C4B5FD" font-size="6.5" font-family="monospace" text-anchor="middle">HOST A</text>
  <rect x="784" y="130" width="44" height="14" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="0.8"/>
  <text x="806" y="140" fill="#BEF264" font-size="6.5" font-family="monospace" text-anchor="middle">HOST B</text>

  <!-- Kokoro TTS label -->
  <rect x="728" y="150" width="107" height="14" rx="3" fill="#050B03" stroke="#2D6B0A" stroke-width="0.8"/>
  <text x="781" y="160" fill="#4D7C0F" font-size="7" font-family="monospace" text-anchor="middle">Kokoro TTS · Streamlit</text>

  <!-- Output bottom labels -->
  <text x="727" y="213" fill="#E2D9FF" font-size="8.5" font-family="monospace" text-anchor="middle" font-weight="bold">CHAT + VOICE OUTPUT</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="859" height="229" rx="10" fill="none" stroke="#1E1E35" stroke-width="1"/>
</svg>
