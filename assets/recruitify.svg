<svg viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg" width="860" height="220">
  <defs>
    <linearGradient id="bgRec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810"/>
      <stop offset="100%" style="stop-color:#07091A"/>
    </linearGradient>
    <linearGradient id="cardRec" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#110828"/>
      <stop offset="100%" style="stop-color:#0A0D1C"/>
    </linearGradient>
    <linearGradient id="embVec" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="dbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#84CC16;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#84CC16;stop-opacity:0"/>
    </radialGradient>
    <filter id="gR" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <marker id="arR1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7C3AED"/>
    </marker>
    <marker id="arR2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#84CC16"/>
    </marker>
    <style>
      @keyframes vecFlow {
        0% { transform: translateX(-100px); opacity: 0; }
        20% { opacity: 1; }
        80% { opacity: 1; }
        100% { transform: translateX(100px); opacity: 0; }
      }
      @keyframes rankDrop {
        0% { opacity: 0; transform: translateY(-5px); }
        20% { opacity: 1; transform: translateY(0); }
        80% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(5px); }
      }
      @keyframes dotPulse {
        0%, 100% { r: 3; opacity: 0.5; }
        50% { r: 5; opacity: 1; }
      }
      @keyframes slideIn {
        0% { stroke-dashoffset: 120; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes biasWarn {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; }
      }
      .vf { animation: vecFlow 3s ease-in-out infinite; }
      .rd { animation: rankDrop 2.5s ease-in-out infinite; }
      .dp { animation: dotPulse 2s ease-in-out infinite; }
      .si1 { animation: slideIn 2s linear infinite; stroke-dasharray: 8 4; }
      .si2 { animation: slideIn 2s linear infinite 0.5s; stroke-dasharray: 8 4; }
      .si3 { animation: slideIn 2s linear infinite 1s; stroke-dasharray: 8 4; }
      .bw { animation: biasWarn 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="10" fill="url(#bgRec)"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#7C3AED" stroke-width="0.5">
    <line x1="0" y1="55" x2="860" y2="55"/>
    <line x1="0" y1="110" x2="860" y2="110"/>
    <line x1="0" y1="165" x2="860" y2="165"/>
    <line x1="172" y1="0" x2="172" y2="220"/>
    <line x1="344" y1="0" x2="344" y2="220"/>
    <line x1="516" y1="0" x2="516" y2="220"/>
    <line x1="688" y1="0" x2="688" y2="220"/>
  </g>

  <!-- Top label -->
  <text x="430" y="17" fill="#4B5563" font-size="9" font-family="monospace" text-anchor="middle" letter-spacing="3">RECRUITIFY · AI RECRUITMENT PLATFORM · 5-PERSON TEAM</text>

  <!-- ====== STEP 1: PDF UPLOAD ====== -->
  <rect x="22" y="32" width="145" height="155" rx="8" fill="url(#cardRec)" stroke="#2D1B6B" stroke-width="1.5"/>

  <!-- Upload icon area -->
  <rect x="34" y="44" width="121" height="80" rx="4" fill="#08051A" stroke="#2D1B6B" stroke-width="1"/>

  <!-- Stack of PDFs animation -->
  <g>
    <!-- PDF pages stacked -->
    <rect x="50" y="85" width="60" height="72" rx="3" fill="#0D0520" stroke="#3B1D8B" stroke-width="1" opacity="0.4"/>
    <rect x="55" y="80" width="60" height="72" rx="3" fill="#110828" stroke="#4C2B9E" stroke-width="1" opacity="0.6"/>
    <rect x="60" y="75" width="60" height="72" rx="3" fill="#140C2E" stroke="#7C3AED" stroke-width="1"/>
    <!-- PDF content lines -->
    <g stroke="#2D1B6B" stroke-width="0.8" opacity="0.9">
      <line x1="68" y1="85" x2="108" y2="85"/>
      <line x1="68" y1="93" x2="108" y2="93"/>
      <line x1="68" y1="101" x2="100" y2="101"/>
      <line x1="68" y1="109" x2="108" y2="109"/>
      <line x1="68" y1="117" x2="95" y2="117"/>
      <line x1="68" y1="125" x2="108" y2="125"/>
      <line x1="68" y1="133" x2="104" y2="133"/>
    </g>
    <!-- PDF icon top right -->
    <text x="105" y="80" fill="#7C3AED" font-size="10" font-family="monospace">PDF</text>
  </g>

  <!-- Upload arrow -->
  <text x="94" y="65" fill="#7C3AED" font-size="16" font-family="monospace" text-anchor="middle" filter="url(#gR)">↑</text>
  <text x="94" y="52" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">ASYNC BATCH</text>

  <text x="94" y="197" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">RESUME</text>
  <text x="94" y="209" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">UPLOAD</text>

  <!-- ====== ARROW 1 ====== -->
  <line class="si1" x1="172" y1="110" x2="225" y2="110" stroke="#7C3AED" stroke-width="2" marker-end="url(#arR1)"/>
  <text x="198" y="104" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">PARSE</text>

  <!-- ====== STEP 2: VECTOR EMBED ====== -->
  <rect x="228" y="32" width="155" height="155" rx="8" fill="url(#cardRec)" stroke="#2D1B6B" stroke-width="1.5"/>

  <!-- Vector space visualization -->
  <rect x="238" y="44" width="135" height="95" rx="4" fill="#060318" stroke="#2D1B6B" stroke-width="1"/>

  <!-- Coordinate axes -->
  <line x1="248" y1="130" x2="248" y2="52" stroke="#2D1B6B" stroke-width="1"/>
  <line x1="248" y1="130" x2="360" y2="130" stroke="#2D1B6B" stroke-width="1"/>
  <text x="248" y="50" fill="#4B5563" font-size="7" font-family="monospace">DIM-2</text>
  <text x="358" y="140" fill="#4B5563" font-size="7" font-family="monospace">DIM-1</text>

  <!-- Embedding points - scattered -->
  <g>
    <!-- Cluster 1 - strong candidates (lime) -->
    <circle class="dp" cx="320" cy="68" r="4" fill="#84CC16" opacity="0.9"/>
    <circle cx="335" cy="75" r="4" fill="#84CC16" opacity="0.7"/>
    <circle cx="310" cy="80" r="3" fill="#84CC16" opacity="0.6"/>
    <circle cx="328" cy="85" r="3.5" fill="#84CC16" opacity="0.8"/>
    <!-- Cluster annotation -->
    <rect x="340" y="60" width="50" height="14" rx="2" fill="#0A1206" stroke="#4D7C0F" stroke-width="0.8"/>
    <text x="365" y="70" fill="#84CC16" font-size="7" font-family="monospace" text-anchor="middle">TOP MATCH</text>

    <!-- Cluster 2 - mid candidates (violet) -->
    <circle cx="278" cy="90" r="3.5" fill="#7C3AED" opacity="0.8"/>
    <circle cx="290" cy="98" r="3" fill="#7C3AED" opacity="0.6"/>
    <circle cx="275" cy="105" r="3" fill="#7C3AED" opacity="0.7"/>

    <!-- Outlier (gray) -->
    <circle cx="258" cy="70" r="2.5" fill="#4B5563" opacity="0.6"/>
    <circle cx="355" cy="115" r="2.5" fill="#4B5563" opacity="0.5"/>
  </g>

  <!-- pgvector label -->
  <text x="305" y="153" fill="#84CC16" font-size="9" font-family="monospace" text-anchor="middle">pgvector</text>
  <text x="305" y="164" fill="#4B5563" font-size="7" font-family="monospace" text-anchor="middle">SEMANTIC RANKING</text>

  <text x="305" y="183" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">EMBED +</text>
  <text x="305" y="194" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">RANK</text>

  <!-- ====== ARROW 2 ====== -->
  <line class="si2" x1="390" y1="110" x2="445" y2="110" stroke="#84CC16" stroke-width="2" marker-end="url(#arR2)"/>
  <text x="418" y="104" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">FLAG</text>

  <!-- ====== STEP 3: BIAS DETECTION ====== -->
  <rect x="448" y="32" width="155" height="155" rx="8" fill="url(#cardRec)" stroke="#4D2B00" stroke-width="1.5"/>

  <!-- Warning triangle visual -->
  <g>
    <!-- JD document -->
    <rect x="458" y="46" width="75" height="90" rx="3" fill="#0D0520" stroke="#2D1B6B" stroke-width="1"/>
    <g stroke="#2D1B6B" stroke-width="0.8" opacity="0.7">
      <line x1="464" y1="58" x2="524" y2="58"/>
      <line x1="464" y1="66" x2="524" y2="66"/>
      <line x1="464" y1="74" x2="510" y2="74"/>
      <!-- Highlighted bias words in orange/red -->
      <rect x="464" y="81" width="28" height="9" rx="1" fill="#7C2D12" stroke="none" opacity="0.8"/>
      <line x1="496" y1="85" x2="524" y2="85"/>
      <line x1="464" y1="93" x2="524" y2="93"/>
      <rect x="480" y="100" width="44" height="9" rx="1" fill="#7C2D12" stroke="none" opacity="0.8"/>
      <line x1="464" y1="109" x2="500" y2="109"/>
      <line x1="464" y1="117" x2="524" y2="117"/>
    </g>

    <!-- Warning icon overlay -->
    <polygon points="526,46 560,46 543,78" fill="#7C2D12" stroke="#F97316" stroke-width="1.5" opacity="0.9"/>
    <text x="543" y="70" fill="#FED7AA" font-size="14" font-family="monospace" text-anchor="middle" font-weight="bold">!</text>

    <!-- Bias flags -->
    <rect x="539" y="82" width="58" height="13" rx="3" fill="#1A0805" stroke="#F97316" stroke-width="1"/>
    <text x="568" y="91" fill="#F97316" font-size="8" font-family="monospace" text-anchor="middle" class="bw">BIAS_FLAG</text>

    <rect x="539" y="100" width="58" height="11" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
    <text x="568" y="109" fill="#84CC16" font-size="8" font-family="monospace" text-anchor="middle">NEUTRAL ✓</text>

    <rect x="539" y="115" width="58" height="11" rx="3" fill="#1A0805" stroke="#F97316" stroke-width="1"/>
    <text x="568" y="124" fill="#F97316" font-size="8" font-family="monospace" text-anchor="middle" class="bw">BIAS_FLAG</text>
  </g>

  <text x="525" y="155" fill="#F97316" font-size="8" font-family="monospace" text-anchor="middle">LLM BIAS DETECT</text>

  <text x="525" y="183" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">BIAS</text>
  <text x="525" y="194" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">DETECTION</text>

  <!-- ====== ARROW 3 ====== -->
  <line class="si3" x1="610" y1="110" x2="665" y2="110" stroke="#7C3AED" stroke-width="2" marker-end="url(#arR1)"/>
  <text x="638" y="104" fill="#4B5563" font-size="8" font-family="monospace" text-anchor="middle">SCHEDULE</text>

  <!-- ====== STEP 4: OUTPUT ====== -->
  <rect x="668" y="32" width="168" height="155" rx="8" fill="url(#cardRec)" stroke="#2D1B6B" stroke-width="1.5"/>

  <!-- Ranked candidates list -->
  <text x="752" y="50" fill="#7C3AED" font-size="9" font-family="monospace" text-anchor="middle">RANKED CANDIDATES</text>

  <!-- Rank items -->
  <g class="rd">
    <rect x="678" y="56" width="148" height="20" rx="3" fill="#0A1206" stroke="#84CC16" stroke-width="1"/>
    <text x="695" y="70" fill="#BEF264" font-size="9" font-family="monospace">#1  Anushka J.</text>
    <text x="808" y="70" fill="#84CC16" font-size="9" font-family="monospace" text-anchor="end">98%</text>
  </g>

  <rect x="678" y="80" width="148" height="20" rx="3" fill="#0D0818" stroke="#7C3AED" stroke-width="1"/>
  <text x="695" y="94" fill="#A78BFA" font-size="9" font-family="monospace">#2  Priya S.</text>
  <text x="808" y="94" fill="#7C3AED" font-size="9" font-family="monospace" text-anchor="end">91%</text>

  <rect x="678" y="104" width="148" height="20" rx="3" fill="#0D0818" stroke="#2D1B6B" stroke-width="1"/>
  <text x="695" y="118" fill="#6B7280" font-size="9" font-family="monospace">#3  Rahul M.</text>
  <text x="808" y="118" fill="#6B7280" font-size="9" font-family="monospace" text-anchor="end">84%</text>

  <rect x="678" y="128" width="148" height="20" rx="3" fill="#0D0818" stroke="#2D1B6B" stroke-width="1"/>
  <text x="695" y="142" fill="#6B7280" font-size="9" font-family="monospace">#4  Sneha K.</text>
  <text x="808" y="142" fill="#6B7280" font-size="9" font-family="monospace" text-anchor="end">79%</text>

  <!-- Interview scheduled badge -->
  <rect x="678" y="155" width="148" height="18" rx="4" fill="#0A1206" stroke="#84CC16" stroke-width="1.5"/>
  <text x="752" y="167" fill="#BEF264" font-size="8" font-family="monospace" text-anchor="middle">INTERVIEW SCHEDULED ✓</text>

  <text x="752" y="197" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">OUTPUT +</text>
  <text x="752" y="208" fill="#E2D9FF" font-size="9" font-family="monospace" text-anchor="middle" font-weight="bold">SCHEDULE</text>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="859" height="219" rx="10" fill="none" stroke="#1E1E35" stroke-width="1"/>
</svg>
